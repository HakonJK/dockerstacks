---
services:
  freshrss:
    image: lscr.io/linuxserver/freshrss:latest
    container_name: freshrss
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${config}:/config
    #ports:
     # - 80:80 not needed -> only proxy access
    restart: unless-stopped

    networks:
      - proxy-net
networks:
  proxy-net:
    external:
      name: proxy-net
